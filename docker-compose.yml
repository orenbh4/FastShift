services:
  postgres:
    image: postgres:16
    container_name: fastshift-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fastshift
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - fastshift-postgres-data:/var/lib/postgresql/data

volumes:
  fastshift-postgres-data:
